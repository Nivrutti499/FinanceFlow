services:
  # ── Backend: Express API ──────────────────────────────────────────────────────
  - type: web
    name: financeflow-api
    env: node
    rootDir: FinanceFlow-main/backend
    buildCommand: npm install && npx prisma generate && npx prisma db push && node src/config/seed.js
    startCommand: node src/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: https://financeflow-ui.onrender.com

  # ── Frontend: React/Vite Static Site ─────────────────────────────────────────
  - type: web
    name: financeflow-ui
    env: static
    rootDir: FinanceFlow-main/frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://financeflow-api.onrender.com/api
