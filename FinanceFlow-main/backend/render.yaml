services:
  - type: web
    name: financeflow-api
    env: node
    plan: free
    buildCommand: npm install && npx prisma generate && npx prisma db push && node src/config/seed.js
    startCommand: node src/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: https://your-financeflow.vercel.app
